<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Grid Memory Game</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-back: #16213e;
            --red: #e94560;
            --green-active: #4ecca3;
            --text: #ffffff;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- Difficulty Selection Styles --- */
        #difficulty-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f3460;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
            border: 2px solid var(--green-active);
        }

        .diff-btn {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s;
            text-align: center;
        }

        .diff-btn small { display: block; font-weight: normal; font-size: 0.8rem; opacity: 0.8; }
        .diff-btn:hover { transform: scale(1.05); }
        .easy { background: #4ecca3; color: #1a1a2e; }
        .medium { background: #fca311; color: #1a1a2e; }
        .hard { background: #e94560; color: #ffffff; }

        /* --- Game Styles --- */
        #status-bar { margin-bottom: 20px; text-align: center; }
        #timer { font-size: 2.5rem; font-weight: bold; color: var(--red); margin: 10px 0; }
        
        .grid {
            display: grid;
            gap: 8px;
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card {
            width: 45px;
            height: 45px;
            background-color: var(--card-back);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card.reveal-red { background-color: var(--red); }
        .card.reveal-green { background-color: var(--green-active); border-color: white; }
        .card.active-row { border: 2px solid var(--green-active); cursor: pointer; }

        .controls { margin-top: 25px; margin-bottom: 40px; }
        #start-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            background: var(--green-active);
            border: none;
            border-radius: 5px;
            color: var(--bg);
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        footer span { color: var(--green-active); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="difficulty-modal">
        <div class="modal-content">
            <h2>Select Difficulty</h2>
            <button class="diff-btn easy" onclick="setDifficulty('easy')">
                EASY
                <small>3x5 Grid | 15s Study Time</small>
            </button>
            <button class="diff-btn medium" onclick="setDifficulty('medium')">
                MEDIUM
                <small>4x10 Grid | 30s Study Time</small>
            </button>
            <button class="diff-btn hard" onclick="setDifficulty('hard')">
                HARD (Extreme)
                <small>6x20 Grid | 60s Study Time</small>
            </button>
        </div>
    </div>

    <h1>Memory Grid</h1>
    
    <div id="status-bar">
        <div id="instruction">Select a difficulty to begin...</div>
        <div id="timer">--</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button id="start-btn" style="display:none;" onclick="startMemorizePhase()">Start Memorizing</button>
    </div>

    <footer>
        Developed by <span>Maharram Guluzade</span>
    </footer>

    <script>
        const gridElement = document.getElementById('grid');
        const timerElement = document.getElementById('timer');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start-btn');
        const diffModal = document.getElementById('difficulty-modal');
        
        let ROWS, COLS, MEMORY_TIME;
        let gameState = 'waiting';
        let currentRow = 0;
        let answerKey = [];

        function setDifficulty(level) {
            if(level === 'easy') { 
                ROWS = 5; COLS = 3; MEMORY_TIME = 15; 
            } else if(level === 'medium') { 
                ROWS = 10; COLS = 4; MEMORY_TIME = 30; 
            } else { 
                ROWS = 20; COLS = 6; MEMORY_TIME = 60; 
            }

            diffModal.style.display = 'none';
            startBtn.style.display = 'block';
            gridElement.style.gridTemplateColumns = `repeat(${COLS}, 45px)`;
            instruction.innerText = `${level.toUpperCase()} Mode: Study the grid for ${MEMORY_TIME}s.`;
            initGrid();
        }

        function initGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.id = `card-${r}-${c}`;
                    gridElement.appendChild(card);
                }
            }
        }

        function startMemorizePhase() {
            gameState = 'memorizing';
            currentRow = 0;
            answerKey = [];
            startBtn.style.display = 'none';
            instruction.innerText = "Study the positions!";
            
            for (let r = 0; r < ROWS; r++) {
                answerKey.push(Math.floor(Math.random() * COLS));
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const card = document.getElementById(`card-${r}-${c}`);
                    if (c === answerKey[r]) card.classList.add('reveal-green');
                    else card.classList.add('reveal-red');
                }
            }

            let timeLeft = MEMORY_TIME;
            timerElement.innerText = timeLeft;
            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    if(gameState === 'memorizing') startPlayPhase();
                }
            }, 1000);
        }

        function startPlayPhase() {
            gameState = 'playing';
            instruction.innerText = "Find the green in Row 1!";
            timerElement.innerText = "GO!";
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('reveal-green', 'reveal-red');
                card.onclick = (e) => handleCardClick(e);
            });
            updateRowHighlights();
        }

        function updateRowHighlights() {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active-row'));
            for(let c=0; c<COLS; c++) {
                const card = document.getElementById(`card-${currentRow}-${c}`);
                if(card) card.classList.add('active-row');
            }
        }

        function handleCardClick(e) {
            if (gameState !== 'playing') return;
            const [_, r, c] = e.target.id.split('-').map(Number);
            if (r !== currentRow) return;

            if (c === answerKey[r]) {
                e.target.classList.add('reveal-green');
                currentRow++;
                if (currentRow === ROWS) endGame(true);
                else {
                    instruction.innerText = `Row ${currentRow + 1} next.`;
                    updateRowHighlights();
                }
            } else {
                e.target.classList.add('reveal-red');
                endGame(false);
            }
        }

        function endGame(win) {
            gameState = 'over';
            instruction.innerText = win ? "VICTORY!" : `Score: ${currentRow}/${ROWS}`;
            startBtn.innerText = "Back to Menu";
            startBtn.style.display = 'block';
            startBtn.onclick = () => location.reload();
            for (let r = 0; r < ROWS; r++) {
                document.getElementById(`card-${r}-${answerKey[r]}`).classList.add('reveal-green');
            }
        }
    </script>
</body>
</html>
