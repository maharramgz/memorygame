<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Grid Memory Game</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-back: #16213e;
            --red: #e94560;
            --green: #0f3460; /* Hidden state */
            --green-active: #4ecca3;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; }
        #status-bar { margin-bottom: 20px; text-align: center; }

        #timer {
            font-size: 2rem;
            font-weight: bold;
            color: var(--red);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            gap: 10px;
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card {
            width: 50px;
            height: 50px;
            background-color: var(--card-back);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* State Classes */
        .card.reveal-red { background-color: var(--red); }
        .card.reveal-green { background-color: var(--green-active); border-color: white; }
        .card.hidden { cursor: pointer; }
        .card.disabled { cursor: not-allowed; opacity: 0.6; }

        .controls { margin-top: 20px; }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            background: var(--green-active);
            border: none;
            border-radius: 5px;
            color: var(--bg);
            font-weight: bold;
        }

        .row-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            grid-column: span 6;
            margin-top: 5px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<h1>Memory Grid 6x20</h1>

<div id="status-bar">
    <div id="instruction">Click "Start" to see the Key Map for 60 seconds!</div>
    <div id="timer">--</div>
</div>

<div class="grid" id="grid"></div>

<div class="controls">
    <button id="start-btn" onclick="startMemorizePhase()">Start Game</button>
</div>

<script>
    const gridElement = document.getElementById('grid');
    const timerElement = document.getElementById('timer');
    const instruction = document.getElementById('instruction');
    const startBtn = document.getElementById('start-btn');

    const ROWS = 20;
    const COLS = 6;
    let gameState = 'waiting'; // waiting, memorizing, playing, over
    let currentRow = 0;
    let answerKey = []; // Stores the index of the green card for each row

    // Initialize empty grid visually
    function initGrid() {
        gridElement.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const card = document.createElement('div');
                card.classList.add('card');
                card.id = `card-${r}-${c}`;
                gridElement.appendChild(card);
            }
        }
    }

    function startMemorizePhase() {
        gameState = 'memorizing';
        currentRow = 0;
        answerKey = [];
        startBtn.style.display = 'none';
        instruction.innerText = "MEMORIZE THE GREENS!";

        // Generate Random Answers
        for (let r = 0; r < ROWS; r++) {
            answerKey.push(Math.floor(Math.random() * COLS));
        }

        // Show all cards
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const card = document.getElementById(`card-${r}-${c}`);
                if (c === answerKey[r]) {
                    card.classList.add('reveal-green');
                } else {
                    card.classList.add('reveal-red');
                }
            }
        }

        // 60 Second Timer
        let timeLeft = 60;
        timerElement.innerText = timeLeft;
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                startPlayPhase();
            }
        }, 1000);
    }

    function startPlayPhase() {
        gameState = 'playing';
        instruction.innerText = "Start from Row 1! Find the greens.";
        timerElement.innerText = "GO!";

        // Hide all cards
        document.querySelectorAll('.card').forEach(card => {
            card.classList.remove('reveal-green', 'reveal-red');
            card.onclick = (e) => handleCardClick(e);
        });
    }

    function handleCardClick(e) {
        if (gameState !== 'playing') return;

        const idParts = e.target.id.split('-');
        const r = parseInt(idParts[1]);
        const c = parseInt(idParts[2]);

        // Ensure player plays row by row
        if (r !== currentRow) {
            alert(`Please select a card in Row ${currentRow + 1}`);
            return;
        }

        if (c === answerKey[r]) {
            // Correct
            e.target.classList.add('reveal-green');
            currentRow++;
            if (currentRow === ROWS) {
                endGame(true);
            }
        } else {
            // Wrong
            e.target.classList.add('reveal-red');
            endGame(false);
        }
    }

    function endGame(win) {
        gameState = 'over';
        if (win) {
            instruction.innerText = "PERFECT! You remembered all 20!";
        } else {
            instruction.innerText = `Game Over! Score: ${currentRow} rows.`;
        }
        startBtn.innerText = "Try Again";
        startBtn.style.display = 'block';
        startBtn.onclick = () => location.reload();
    }

    initGrid();
</script>
</body>
</html>
